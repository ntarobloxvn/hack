<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTARobloxVN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;

background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1e3c72,#2a5298);
background-size:500% 500%;
animation:bgmove 15s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HELLO SCREEN */
#helloScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;

background:rgba(0,0,0,0.35);
backdrop-filter:blur(8px);

z-index:9999;

animation:fadeOut 0.8s ease 2s forwards;
}

.helloBox{
padding:20px 70px;

font-size:28px;
font-weight:700;
color:white;

border-radius:20px;

background:linear-gradient(135deg,#00c6ff,#0072ff);

box-shadow:
0 0 30px rgba(0,150,255,0.9),
0 10px 30px rgba(0,0,0,0.5);

animation:helloPop 0.6s ease;
}

@keyframes helloPop{
0%{transform:scale(0.6);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* PARTICLES */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* FLOATING ORBS */
.orb{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:0.6;
animation:float 12s infinite ease-in-out;
}

.orb1{
width:300px;
height:300px;
background:#4facfe;
top:10%;
left:15%;
}

.orb2{
width:250px;
height:250px;
background:#00c6ff;
bottom:15%;
right:20%;
animation-delay:4s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* CARD */
.card{
position:relative;
z-index:2;

text-align:center;
padding:55px 40px;
border-radius:25px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);

box-shadow:
0 25px 60px rgba(0,0,0,0.45),
0 0 40px rgba(255,255,255,0.1) inset;

max-width:420px;
width:90%;

transition:transform .3s ease;
}

/* GLOW BORDER */
.card:before{
content:"";
position:absolute;
inset:-2px;
border-radius:25px;

background:linear-gradient(45deg,#00eaff,#0066ff,#00eaff);
background-size:300%;

z-index:-1;
filter:blur(6px);

animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
0%{background-position:0%}
100%{background-position:300%}
}

/* TITLE */
h1{
font-size:28px;
font-weight:700;
color:white;
margin-bottom:10px;
text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* SUBTITLE */
.subtitle{
color:#d0e7ff;
margin-bottom:35px;
font-size:14px;
letter-spacing:2px;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:16px;

margin:12px 0;

border-radius:14px;
text-decoration:none;

font-weight:600;
font-size:15px;
color:white;

background:linear-gradient(135deg,#00c6ff,#0072ff);

box-shadow:
0 10px 25px rgba(0,0,0,0.35),
0 0 15px rgba(0,132,255,0.8);

transition:.3s;

position:relative;
overflow:hidden;
}

.btn:hover{
transform:translateY(-4px) scale(1.03);

background:linear-gradient(135deg,#38dfff,#1a6cff);

box-shadow:
0 20px 40px rgba(0,0,0,0.5),
0 0 35px rgba(0,153,255,1);
}

/* RIPPLE */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.6);
transform:scale(0);
animation:rippleAnim .6s linear;
pointer-events:none;
}

@keyframes rippleAnim{
to{transform:scale(4);opacity:0;}
}

/* RESPONSIVE */
@media(max-width:480px){

.card{padding:45px 28px;}

h1{font-size:22px;}

.btn{
font-size:14px;
padding:15px;
}

}

</style>
</head>

<body>

<!-- HELLO SCREEN -->
<div id="helloScreen">
<div class="helloBox">HELLO !</div>
</div>

<canvas id="particles"></canvas>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card" id="card">

<h1>TẤT CẢ NHỮNG THỨ TRÊN VIDEO :</h1>

<div class="subtitle">NTARobloxVN</div>

<a class="btn"
href="https://www.mediafire.com/file/ve89aen8nuyqqd3/Delta+x+VNG+v2.710.apk/file"
target="_blank">
DELTA EXECUTOR NEW VERSION
</a>

<a class="btn"
href="https://pastefy.app/UxbVWlGF/raw"
target="_blank">
SCRIPT TRONG VIDEO :
</a>

</div>

<script>

/* PARTICLES */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5
});
}

function drawParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.6)";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

});

requestAnimationFrame(drawParticles);

}

drawParticles();

/* 3D CARD */

const card=document.getElementById("card");

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2 - e.clientX)/25;
const y=(window.innerHeight/2 - e.clientY)/25;

card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;

});

/* RIPPLE BUTTON */

document.querySelectorAll(".btn").forEach(btn=>{

btn.addEventListener("click",function(e){

const circle=document.createElement("span");
circle.classList.add("ripple");

const rect=this.getBoundingClientRect();
const size=Math.max(rect.width,rect.height);

circle.style.width=circle.style.height=size+"px";
circle.style.left=(e.clientX-rect.left-size/2)+"px";
circle.style.top=(e.clientY-rect.top-size/2)+"px";

this.appendChild(circle);

setTimeout(()=>circle.remove(),600);

});

});

/* RESIZE */

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
