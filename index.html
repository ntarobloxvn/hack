<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Web</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
}

/* background glow animation */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#2ea8ff,transparent 70%);
filter:blur(120px);
animation:float 8s infinite alternate;
}

@keyframes float{
from{transform:translate(-200px,-200px)}
to{transform:translate(200px,200px)}
}

/* container */

.container{
width:90%;
max-width:420px;
text-align:center;
padding:40px 30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:
0 10px 40px rgba(0,0,0,0.6),
0 0 30px rgba(0,170,255,0.3);
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* title */

.main-title{
font-size:30px;
font-weight:700;
margin-bottom:8px;
letter-spacing:1px;
}

.sub{
font-size:15px;
opacity:0.7;
margin-bottom:35px;
}

/* content title */

.content-title{
font-size:22px;
margin-bottom:25px;
font-weight:600;
}

/* buttons */

.btn{
display:block;
width:100%;
padding:16px;
margin:12px 0;
border:none;
border-radius:14px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(135deg,#1fa2ff,#12d8fa,#a6ffcb);
color:#0a1a25;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
transition:all .3s ease;
}

.btn:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:
0 15px 35px rgba(0,0,0,0.6),
0 0 20px rgba(0,200,255,0.8);
}

.btn:active{
transform:scale(0.96);
}

/* mobile optimization */

@media (max-width:480px){

.main-title{
font-size:24px;
}

.content-title{
font-size:20px;
}

.btn{
font-size:16px;
padding:14px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="main-title">
SCRIPT TRÊN VIDEO
</div>

<div class="sub">
NTARobloxVN
</div>

<div class="content-title">
SCRIPT Ở ĐÂY
</div>

<button class="btn"
onclick="window.open('https://pastefy.app/gQOsRqKh/raw')">
Link 1
</button>

<button class="btn"
onclick="window.open('https://pastefy.app/j42AOA4W/raw')">
Link 2
</button>

</div>

</body>
</html>
